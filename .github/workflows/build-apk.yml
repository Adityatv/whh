name: iMusic - Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup
        run: |
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          JAR="gradle/wrapper/gradle-wrapper.jar"
          [ ! -f "$JAR" ] && curl -fsSL "https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar" -o "$JAR"
          chmod +x gradlew

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml') }}

      - name: Build Debug APK
        run: |
          unset GRADLE_OPTS
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: iMusic-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
