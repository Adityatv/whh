name: iMusic - Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set Up Android SDK
        run: |
          ANDROID_SDK="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/platform-tools" >> $GITHUB_PATH
          echo "sdk.dir=$ANDROID_SDK" > local.properties
          echo "local.properties written: sdk.dir=$ANDROID_SDK"

      - name: Install SDK Platform 34
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      - name: Restore Gradle Wrapper JAR
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar (Gradle 8.6)..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
            echo "Downloaded: $(du -sh $JAR)"
          else
            echo "gradle-wrapper.jar already present."
          fi

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx3g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iMusic-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Write Build Summary
        run: |
          echo "## ✅ iMusic APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Min SDK | 24 (Android 7.0+) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set Up Android SDK
        run: |
          ANDROID_SDK="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_SDK" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "sdk.dir=$ANDROID_SDK" > local.properties

      - name: Install SDK Platform 34
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME 2>/dev/null || true

      - name: Restore Gradle Wrapper JAR
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR" ]; then
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR"
          fi

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g -XX:MaxMetaspaceSize=512m"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Get Release Info
        id: info
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="iMusic-v1.0.0-${GITHUB_SHA::7}.apk"
          mv "$APK" "app/build/outputs/apk/release/$NEW_NAME"
          echo "APK_PATH=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-${{ steps.info.outputs.SHORT_SHA }}"
          name: "iMusic v1.0.0 — ${{ steps.info.outputs.DATE }}"
          body: |
            ## iMusic — Free Music Streaming

            Build: ${{ steps.info.outputs.SHORT_SHA }} — ${{ steps.info.outputs.DATE }}

            ### How to install
            1. Download the APK below
            2. Android: Settings > Security > Install Unknown Apps > enable
            3. Open APK > Install > enjoy 600K+ free songs

            Requires Android 7.0+ (API 24)
          files: ${{ steps.info.outputs.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
