name: iMusic - Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradle-wrapper.jar is often missing from repos — download it if absent
      - name: Restore Gradle Wrapper JAR
        run: |
          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR_PATH" ]; then
            echo "Downloading gradle-wrapper.jar for Gradle 8.6..."
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR_PATH"
          fi

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: iMusic-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      - name: Write Build Summary
        run: |
          echo "## ✅ iMusic APK Built Successfully" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Min SDK | 24 (Android 7.0+) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Gradle Wrapper JAR
        run: |
          JAR_PATH="gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$JAR_PATH" ]; then
            mkdir -p gradle/wrapper
            curl -fsSL \
              "https://github.com/gradle/gradle/raw/refs/tags/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$JAR_PATH"
          fi

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g -XX:MaxMetaspaceSize=512m"

      - name: Get Release Info
        id: info
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          NEW_NAME="iMusic-v1.0.0-${GITHUB_SHA::7}.apk"
          mv "$APK" "app/build/outputs/apk/release/$NEW_NAME"
          echo "APK_PATH=app/build/outputs/apk/release/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "APK_NAME=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-${{ steps.info.outputs.SHORT_SHA }}"
          name: "iMusic v1.0.0 — ${{ steps.info.outputs.DATE }}"
          body: |
            ## 🎵 iMusic — Free Music Streaming

            **Build:** `${{ steps.info.outputs.SHORT_SHA }}` · `${{ steps.info.outputs.DATE }}`

            ### 📥 How to install
            1. Download **`${{ steps.info.outputs.APK_NAME }}`** below
            2. Android phone → **Settings → Security → Install Unknown Apps** → enable
            3. Open the APK → **Install** → enjoy!

            **Requires:** Android 7.0+ (API 24)
          files: ${{ steps.info.outputs.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
