name: iMusic - Build Android APK

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:            # Allows manual trigger from GitHub Actions tab
    inputs:
      release_type:
        description: 'Build type (debug / release)'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write               # Needed to create GitHub Releases

# ─── Concurrency: Cancel older runs on same branch ────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── JOB: Build APK ──────────────────────────────────────────────────────────
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 17 — matches compileOptions in build.gradle.kts
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Validate Gradle wrapper (security check)
      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      # 4. Cache Gradle dependencies — speeds up repeat builds significantly
      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 5. Make gradlew executable
      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      # 6. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Xmx4g"

      # 7. Rename APK to a friendly name with version + commit SHA
      - name: Rename APK
        run: |
          cd app/build/outputs/apk/debug/
          mv app-debug.apk iMusic-v1.0.0-debug-${{ github.sha }}.apk
          echo "APK_PATH=app/build/outputs/apk/debug/iMusic-v1.0.0-debug-${{ github.sha }}.apk" >> $GITHUB_ENV
          echo "APK_NAME=iMusic-v1.0.0-debug-${{ github.sha }}.apk" >> $GITHUB_ENV

      # 8. Upload APK as workflow artifact (available for 90 days)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iMusic-Debug-APK
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # 9. Generate build info summary
      - name: Build Summary
        run: |
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK Name** | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | Debug |" >> $GITHUB_STEP_SUMMARY
          echo "| **Min SDK** | 24 (Android 7.0) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target SDK** | 34 (Android 14) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY

  # ─── JOB: Create GitHub Release (only on push to main) ────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build                # Only runs if build job succeeds
    # Only create a release on direct pushes to main (not PRs)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      # 1. Checkout for tag info
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 17
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Restore Gradle cache
      - name: Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # 4. Make gradlew executable
      - name: Grant Execute Permission to gradlew
        run: chmod +x gradlew

      # 5. Build Release APK (unsigned — good for personal sideloading)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4g"

      # 6. Generate a short SHA for the tag
      - name: Get Short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # 7. Generate release timestamp
      - name: Get Timestamp
        id: time
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # 8. Rename release APK
      - name: Rename Release APK
        run: |
          cd app/build/outputs/apk/release/
          # apk may be named app-release-unsigned.apk
          APK=$(ls *.apk | head -1)
          mv "$APK" "iMusic-v1.0.0-release-${{ steps.sha.outputs.SHORT_SHA }}.apk"
          echo "RELEASE_APK=app/build/outputs/apk/release/iMusic-v1.0.0-release-${{ steps.sha.outputs.SHORT_SHA }}.apk" >> $GITHUB_ENV
          echo "RELEASE_APK_NAME=iMusic-v1.0.0-release-${{ steps.sha.outputs.SHORT_SHA }}.apk" >> $GITHUB_ENV

      # 9. Create GitHub Release and attach APK
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.0-${{ steps.time.outputs.TIMESTAMP }}"
          name: "iMusic v1.0.0 — ${{ steps.time.outputs.TIMESTAMP }}"
          body: |
            ## 🎵 iMusic v1.0.0

            **Automated build** from commit `${{ github.sha }}`

            ### 📥 Installation
            1. Download `${{ env.RELEASE_APK_NAME }}` below
            2. On your phone: **Settings → Security → Install Unknown Apps** → enable for your browser/file manager
            3. Open the APK and tap **Install**
            4. Open iMusic and enjoy 600K+ free songs! 🎵

            ### ✨ What's included
            - 🎵 600,000+ free Creative Commons songs via Jamendo API
            - 🎤 Synchronized lyrics via LrcLib
            - 📲 Background playback + lock screen controls
            - 🎛️ Full player: shuffle, repeat, queue, sleep timer
            - 📚 Library: favorites, playlists, downloads
            - 🌙 Dark / Light theme

            ### ⚙️ Requirements
            - Android 7.0+ (API 24)
            - Internet connection for streaming

            ---
            Built with ❤️ using GitHub Actions · [Source Code](${{ github.server_url }}/${{ github.repository }})
          files: ${{ env.RELEASE_APK }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
